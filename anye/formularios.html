<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <section class="container">
        <form action="">
            <section class="mb-3">
                <label class="forms label" for="nombre">Nombre</label>
                <input placeholder="Nombres y Apellidos" class="form-control" type="text" name="nombre" id="nombre">
            </section>

            <section class="mb-3 row">
                <label class="col form label col-2" for="email">Email</label>
                <article class="col-10">
                <input placeholder="Email" class="form-control-plaintext" type="email" name="email"  id="email" disabled value="anyetk31@gmail.com">
                </article>
            </section>

            <section class="mb-3">
                <label class="forms label" for="descripcion">Descripcion</label>
                <textarea placeholder="Descripción" class="form-control" name="descripcion" id="descripcion" cols="30" rows="10"></textarea>
            </section>
        </form>
    </section>
</body>
</html>
