<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
    <main class="container py-4">
        <form action="">
            <section class="row">
                <article class="col-auto">
                    <input type="email" class="form-control" placeholder="Ingrese Correo Electronico: ">
                </article>
                <article class="col-auto">
                    <input type="password" class="form-control" placeholder="Ingrese Su Contraseña: ">
                </article>
                <article class="col-auto">
                    <button type="submit" class="btn btn-danger">Ingresar</button>
                </article>
                <article>
                    <label for="archivo"></label>
                    <input class="form-control" type="file" name="" id="">
                </article>
                <article class="mb-3">
                    <label for="archivomultiple"></label>
                    <input class="form-control form-control-lg" type="file" name="archivo" id="archivomultiple" multiple>
                </article>
                <article class="mb-3">
                    <label for="color">Selector de color</label>
                    <input class="form-control form-control-color" type="color" name="color" id="color">
                </article>
                <article class="mb-3">
                    <select name="" id="">
                        <option value="1" class="">Anye</option>
                        <option value="2" class="">Karol</option>
                        <option value="3" class="">Stiven</option>
                        <option value="4" class="">Erika</option>
                        <option value="5" class="">Hernan</option>
                    </select>
                </article>
            </section>
        </form>
    </main>
</body>
</html>
