<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Maqueta de Cajas</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background: #f8f8f8;
			font-family: Arial, sans-serif;
		}

		.page {
			min-height: 400vh;
			border: 8px solid #5f2ca1;
			padding: 8px;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		section {
			border: 6px solid #000;
			height: 100vh;
			padding: 12px;
			display: flex;
			flex-direction: column;
			gap: 10px;
			background: #fff;
		}

		.caja {
			border: 3px solid #000;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 20px;
			font-weight: 700;
			text-transform: uppercase;
		}

		/* Seccion 1 */
		.s1-top {
			background: #dce9c9;
			height: 70px;
		}

		.s1-mid {
			background: #d5dee7;
			height: 70px;
		}

		.s1-main {
			background: #f8e9c6;
			flex: 1;
		}

		/* Seccion 2 */
		.s2 {
			display: grid;
			grid-template-columns: 2fr 1.1fr;
			gap: 10px;
		}

		.s2-left {
			border: 4px solid #a10000;
			background: #f0d5c3;
		}

		.s2-right {
			border: 4px solid #a10000;
			padding: 8px;
			display: grid;
			grid-template-rows: 70px 1fr 1fr;
			gap: 8px;
			background: #f8f8f8;
		}

		.s2-bar {
			background: #d5dee7;
			border: 3px solid #00a9e0;
		}

		.s2-box {
			background: #f0d5c3;
			border: 3px solid #00a9e0;
		}

		/* Seccion 3 */
		.s3 {
			display: grid;
			grid-template-columns: 2fr 1fr;
			gap: 10px;
		}

		.s3-left {
			border: 4px solid #a10000;
			background: #d6deed;
		}

		.s3-right {
			border: 4px solid #a10000;
			padding: 8px;
			display: grid;
			grid-template-rows: 1fr 1fr;
			gap: 8px;
			background: #f8f8f8;
		}

		.s3-box {
			background: #d6deed;
			border: 3px solid #00a9e0;
		}

		/* Seccion 4 */
		.s4 {
			border: 4px solid #a10000;
			padding: 8px;
			display: grid;
			grid-template-rows: 60px 1fr 60px;
			gap: 8px;
			background: #f8f8f8;
		}

		.s4-bar {
			background: #d5dee7;
			border: 3px solid #a10000;
		}

		.s4-center {
			border: 3px solid #a10000;
			background: #dce9c9;
			padding: 10px;
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 8px;
		}

		.s4-cell {
			background: #dce9c9;
			border: 3px solid #00a9e0;
		}

		@media (max-width: 900px) {
			.s2 {
				grid-template-columns: 1fr;
			}

			.s3 {
				grid-template-columns: 1fr;
			}

			.s4-center {
				grid-template-columns: repeat(2, 1fr);
			}
		}
	</style>
</head>
<body>
	<div class="page">
		<section>
			<div class="caja s1-top">Caja</div>
			<div class="caja s1-mid">Caja</div>
			<div class="caja s1-main">Caja</div>
		</section>

		<section class="s2">
			<div class="caja s2-left">Caja</div>
			<div class="s2-right">
				<div class="caja s2-bar">Caja</div>
				<div class="caja s2-box">Caja</div>
				<div class="caja s2-box">Caja</div>
			</div>
		</section>

		<section class="s3">
			<div class="caja s3-left">Caja</div>
			<div class="s3-right">
				<div class="caja s3-box">Caja</div>
				<div class="caja s3-box">Caja</div>
			</div>
		</section>

		<section class="s4">
			<div class="caja s4-bar">Caja</div>
			<div class="s4-center">
				<div class="caja s4-cell">Caja</div>
				<div class="caja s4-cell">Caja</div>
				<div class="caja s4-cell">Caja</div>
				<div class="caja s4-cell">Caja</div>
			</div>
			<div class="caja s4-bar">Caja</div>
		</section>
	</div>
</body>
</html>
