<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <title>Carousel</title>
</head>
<body>
    <main class="container py-4">
        <section id="Carrusel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="500">
            <section class="carousel-inner" style="text-align: center;">
                <article class="carousel-item active"><img src="/img1.jpg" alt="Carousel"></article>
                <article class="carousel-item"><img src="./img2.jpg" alt="Carousel"></article>
                <article class="carousel-item"><img src="/img3.jpg" alt="Carousel"></article>
                <article class="carousel-item"><img src="/img4.jpg" alt="Carousel"></article>
                <article class="carousel-item"><img src="/img5.jpg" alt="Carousel"></article>
            </section>
            <button class="carousel-control-prev" type="button" data-bs-target="#Carrusel" data-bs-slide="prev">
				<span class="carousel-control-prev-icon bg-dark rounded-circle p-4" aria-hidden="true"></span>
				<span class="visually-hidden">Previous</span>
			</button>
			<button class="carousel-control-next" type="button" data-bs-target="#Carrusel" data-bs-slide="next">
				<span class="carousel-control-next-icon bg-dark rounded-circle p-4" aria-hidden="true"></span>
				<span class="visually-hidden">Next</span>
			</button>
        </section>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
